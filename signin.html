<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
  import { getAuth, signInWithPopup, GoogleAuthProvider, getIdToken } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';

  const app = initializeApp({
    apiKey: "AIzaSyCzrCH4d5TUdKi4uS_3Z1COSpVrHGpR-Qw",
    authDomain: "pulse-trader-869c9.firebaseapp.com",
    projectId: "pulse-trader-869c9",
    clientId: "944678204091-0budqf4gofe48ulli5i6re6gn9dhba4k.apps.googleusercontent.com"
  });

  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  window.signInWithGoogle = async function() {
    const btn = document.getElementById('google-btn');
    const status = document.getElementById('status');
    const error = document.getElementById('error');
    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const result = await signInWithPopup(auth, provider);
      const idToken = await getIdToken(result.user);

      // Send token to PulseTrader backend
      const resp = await fetch('https://pulsetrader-backend-production-3f42.up.railway.app/auth/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken })
      });
      const data = await resp.json();

      if (data.user) {
        // Store in localStorage so extension picks it up
        localStorage.setItem('pt-user', JSON.stringify({
          user: data.user,
          status: data.status,
          idToken: idToken
        }));

        var urlParams = new URLSearchParams(window.location.search);
        var plan = urlParams.get('plan');

        if (plan) {
          // Coming from paywall - redirect to Stripe
          status.style.display = 'block';
          status.textContent = 'Redirecting to checkout...';
          btn.style.display = 'none';
          setTimeout(function() {
            window.location.href = plan === 'pro'
              ? 'https://buy.stripe.com/6oU6oI2o38KJ1B7bCWdEs02'
              : 'https://buy.stripe.com/eVq8wQfaPf97djPeP8dEs01';
          }, 800);
        } else {
          // Coming from first install
          status.style.display = 'block';
          status.textContent = 'Your 7-day trial is active! Go back to TradingView and refresh the page.';
          btn.style.display = 'none';
        }
      }
    } catch(err) {
      error.style.display = 'block';
      error.textContent = 'Sign-in failed: ' + err.message;
      btn.disabled = false;
      btn.innerHTML = googleBtnHTML;
    }
  };
</script>
